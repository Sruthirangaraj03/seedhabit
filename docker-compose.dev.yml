version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: seedhabit-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seedhabit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seedhabit}
      POSTGRES_DB: ${POSTGRES_DB:-seedhabit}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seedhabit} -d ${POSTGRES_DB:-seedhabit}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - seedhabit-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seedhabit-backend-dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-seedhabit}:${POSTGRES_PASSWORD:-seedhabit}@postgres:5432/${POSTGRES_DB:-seedhabit}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/v1/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - seedhabit-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: seedhabit-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    depends_on:
      - backend
    networks:
      - seedhabit-network

networks:
  seedhabit-network:
    driver: bridge

volumes:
  postgres_data_dev:
